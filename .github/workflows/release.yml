name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Publish release
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine release target
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
        run: |
          set -euo pipefail

          if [ "${REF_TYPE}" = "tag" ]; then
            TAG_NAME="${REF_NAME}"
            CREATE_TAG="false"
          else
            VERSION="$(node -e "console.log(JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version)")"
            TAG_NAME="v${VERSION}"
            CREATE_TAG="true"
          fi

          node scripts/validate-release-version.mjs "${TAG_NAME}"

          {
            echo "tag_name=${TAG_NAME}"
            echo "should_release=true"
          } >> "${GITHUB_OUTPUT}"

          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            echo "Release ${TAG_NAME} already exists. Skipping publish."
            echo "should_release=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if [ "${CREATE_TAG}" = "true" ]; then
            if git ls-remote --exit-code --tags origin "refs/tags/${TAG_NAME}" >/dev/null 2>&1; then
              echo "Tag ${TAG_NAME} already exists. Publishing release for the existing tag."
            else
              git config user.name "github-actions[bot]"
              git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
              git tag "${TAG_NAME}" "${GITHUB_SHA}"
              git push origin "refs/tags/${TAG_NAME}"
            fi
          fi

      - name: Setup Node
        if: steps.release.outputs.should_release == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Configure GitHub Packages
        if: steps.release.outputs.should_release == 'true'
        run: |
          {
            echo "@carvalhorafael:registry=https://npm.pkg.github.com"
            echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}"
          } > .npmrc
        env:
          NODE_AUTH_TOKEN: ${{ secrets.PROENEM_PACKAGES_TOKEN }}

      - name: Install dependencies
        if: steps.release.outputs.should_release == 'true'
        run: npm ci

      - name: Install Playwright browsers
        if: steps.release.outputs.should_release == 'true'
        run: npx playwright install --with-deps chromium

      - name: Check release version
        if: steps.release.outputs.should_release == 'true'
        env:
          TAG_NAME: ${{ steps.release.outputs.tag_name }}
        run: npm run release:check-version -- "${TAG_NAME}"

      - name: Start WordPress
        if: steps.release.outputs.should_release == 'true'
        run: npm run wp:start

      - name: Install PHP dependencies
        if: steps.release.outputs.should_release == 'true'
        run: npm run composer:install

      - name: Validate release package
        if: steps.release.outputs.should_release == 'true'
        run: npm run validate

      - name: Publish GitHub Release
        if: steps.release.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.release.outputs.tag_name }}
        run: |
          gh release create "${TAG_NAME}" \
            dist/proenem-wordpress-theme.zip \
            --title "Proenem WordPress Theme ${TAG_NAME}" \
            --generate-notes

      - name: Stop WordPress
        if: always() && steps.release.outputs.should_release == 'true'
        continue-on-error: true
        run: npm run wp:stop
